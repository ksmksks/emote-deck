<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>EmoteDeck Config</title>
    <link rel="stylesheet" href="./config.css">
    <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
  </head>
  <body>
    <main class="config-shell">
      <section class="config-panel">
        <header class="config-header">
          <h1>EmoteDeck Config</h1>
          <p>設定はリアルタイムで右側プレビューに反映されます。</p>
        </header>

        <form id="config-form" class="config-form" autocomplete="off">
          <label class="control checkbox">
            <input id="showEmotes" type="checkbox" checked>
            <span>showEmotes</span>
          </label>

          <label class="control checkbox">
            <input id="showSubBadges" type="checkbox" checked>
            <span>showSubBadges</span>
          </label>

          <label class="control checkbox">
            <input id="showBitsBadges" type="checkbox" checked>
            <span>showBitsBadges</span>
          </label>

          <label class="control">
            <span>tierOrder</span>
            <select id="tierOrder">
              <option value="asc">1000 → 3000</option>
              <option value="desc">3000 → 1000</option>
            </select>
          </label>

          <label class="control">
            <span>columns</span>
            <div class="range-wrap">
              <input id="columns" type="range" min="2" max="8" step="1" value="4">
              <output id="columnsValue">4</output>
            </div>
          </label>

          <label class="control">
            <span>emoteSize</span>
            <div class="range-wrap">
              <input id="emoteSize" type="range" min="32" max="112" step="2" value="56">
              <output id="emoteSizeValue">56</output>
            </div>
          </label>

          <label class="control">
            <span>theme</span>
            <select id="theme">
              <option value="custom">custom</option>
              <option value="ocean">ocean</option>
              <option value="sunset">sunset</option>
              <option value="forest">forest</option>
            </select>
          </label>

          <label class="control">
            <span>primaryColor</span>
            <input id="primaryColor" type="color" value="#1f8ef1">
          </label>

          <label class="control">
            <span>accentColor</span>
            <input id="accentColor" type="color" value="#f9c74f">
          </label>

          <label class="control">
            <span>backgroundColor</span>
            <input id="backgroundColor" type="color" value="#111827">
          </label>

          <label class="control">
            <span>borderRadius</span>
            <div class="range-wrap">
              <input id="borderRadius" type="range" min="0" max="24" step="1" value="12">
              <output id="borderRadiusValue">12</output>
            </div>
          </label>

          <label class="control">
            <span>glowIntensity</span>
            <div class="range-wrap">
              <input id="glowIntensity" type="range" min="0" max="32" step="1" value="12">
              <output id="glowIntensityValue">12</output>
            </div>
          </label>
        </form>

        <div class="buttons">
          <button id="save-button" type="button">保存</button>
          <button id="reset-button" type="button" class="secondary">初期値に戻す</button>
        </div>
        <p id="config-status" class="status">初期化中...</p>
      </section>

      <section class="preview-panel">
        <h2>Preview</h2>
        <div id="preview"></div>
      </section>
    </main>

    <script src="./render.js"></script>
    <script src="./config.js"></script>
  </body>
</html>
